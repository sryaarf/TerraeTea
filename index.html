<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRAE TEA — Laporan Stok Harian</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0e0f0f;
    --surface: #161818;
    --surface2: #1d2020;
    --border: #2a2e2e;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --danger: #f04a4a;
    --warn: #f0b84a;
    --text: #e8ede8;
    --muted: #6b7370;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .header-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
  }

  .header-meta strong { color: var(--accent2); display: block; }

  /* TABS */
  .tabs-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }

  .tab:hover { color: var(--text); background: rgba(200,240,74,0.05); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(200,240,74,0.07);
  }

  .tab .close-btn {
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.15s;
    color: var(--danger);
    padding: 0 2px;
    line-height: 1;
  }

  .tab:hover .close-btn { opacity: 1; }

  .tab-add {
    font-family: var(--mono);
    font-size: 1.1rem;
    padding: 10px 16px;
    cursor: pointer;
    color: var(--muted);
    border-radius: 4px;
    transition: all 0.15s;
    margin-left: 4px;
  }

  .tab-add:hover { color: var(--accent); background: rgba(200,240,74,0.1); }

  /* CONTENT */
  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* LAPORAN HEADER SECTION */
  .report-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }

  .field-group label {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 6px;
  }

  .field-group input, .field-group select, .field-group textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 8px 12px;
    border-radius: 3px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    border-color: var(--accent);
  }

  .field-group select option { background: var(--surface); }

  /* TABLE SECTION */
  .section-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-label .badge {
    background: var(--accent);
    color: #0e0f0f;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 700;
  }

  .table-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.82rem;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
  }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    white-space: nowrap;
  }

  thead th:first-child { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(255,255,255,0.03); }

  tbody td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  tbody td input, tbody td select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    width: 100%;
    outline: none;
    padding: 2px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  tbody td input:focus, tbody td select:focus {
    border-bottom-color: var(--accent);
  }

  tbody td select option { background: var(--surface); }

  .td-no {
    color: var(--muted);
    font-size: 0.7rem;
    width: 36px;
  }

  .td-status { width: 100px; }

  .status-badge {
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-ok { background: rgba(74,240,200,0.15); color: var(--accent2); }
  .status-low { background: rgba(240,184,74,0.15); color: var(--warn); }
  .status-habis { background: rgba(240,74,74,0.15); color: var(--danger); }

  .td-del {
    width: 36px;
    text-align: center;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .btn-del:hover { color: var(--danger); }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .btn {
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 9px 18px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0e0f0f;
  }

  .btn-primary:hover { background: #d6f55a; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
  }

  .btn-outline:hover { background: rgba(74,240,200,0.1); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--text); }

  .btn-warn {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--warn);
  }

  .btn-warn:hover { background: rgba(240,184,74,0.1); }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.total::before { background: var(--accent); }
  .summary-card.ok::before { background: var(--accent2); }
  .summary-card.low::before { background: var(--warn); }
  .summary-card.habis::before { background: var(--danger); }

  .summary-card .val {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .summary-card.total .val { color: var(--accent); }
  .summary-card.ok .val { color: var(--accent2); }
  .summary-card.low .val { color: var(--warn); }
  .summary-card.habis .val { color: var(--danger); }

  .summary-card .lbl {
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  /* CATATAN */
  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .notes-area textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.83rem;
    padding: 12px;
    border-radius: 3px;
    min-height: 90px;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
    line-height: 1.6;
  }

  .notes-area textarea:focus { border-color: var(--accent); }

  /* SAVED REPORTS LIST */
  .reports-list { display: flex; flex-direction: column; gap: 12px; }

  .report-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .report-item:hover { border-color: var(--accent); }

  .report-item-info { flex: 1; }

  .report-item-title {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .report-item-meta {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }

  .report-item-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 6px 12px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .btn-sm-view { background: rgba(200,240,74,0.15); color: var(--accent); }
  .btn-sm-view:hover { background: rgba(200,240,74,0.25); }

  .btn-sm-img { background: rgba(74,240,200,0.12); color: var(--accent2); }
  .btn-sm-img:hover { background: rgba(74,240,200,0.22); }

  .btn-sm-del { background: rgba(240,74,74,0.12); color: var(--danger); }
  .btn-sm-del:hover { background: rgba(240,74,74,0.22); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-head {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
  }

  .modal-title {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.3rem;
    transition: color 0.15s;
    line-height: 1;
  }

  .modal-close:hover { color: var(--danger); }

  .modal-body { padding: 24px; }

  /* PRINT VIEW */
  #print-view {
    background: #fff;
    color: #111;
    font-family: 'IBM Plex Mono', monospace;
    padding: 32px;
    border-radius: 4px;
  }

  #print-view h2 {
    font-size: 1.1rem;
    margin-bottom: 4px;
    color: #111;
  }

  #print-view .pv-meta {
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #111;
  }

  #print-view table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-bottom: 16px;
  }

  #print-view thead th {
    background: #111;
    color: #fff;
    padding: 7px 10px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  #print-view tbody td {
    padding: 6px 10px;
    border-bottom: 1px solid #ddd;
    color: #111;
  }

  #print-view tbody tr:nth-child(even) { background: #f5f5f5; }

  #print-view .pv-notes {
    font-size: 0.78rem;
    color: #333;
    border-top: 1px solid #ccc;
    padding-top: 12px;
    margin-top: 4px;
  }

  #print-view .pv-footer {
    font-size: 0.68rem;
    color: #999;
    margin-top: 20px;
    text-align: right;
    border-top: 1px solid #eee;
    padding-top: 10px;
  }

  .pv-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }

  .pv-sum-item {
    font-size: 0.72rem;
    padding: 6px 12px;
    border: 1px solid #ccc;
    border-radius: 3px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.82rem;
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 12px 18px;
    border-radius: 3px;
    z-index: 9999;
    transform: translateX(120%);
    transition: transform 0.25s;
    max-width: 300px;
  }

  .toast.show { transform: translateX(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .content { padding: 16px; }
    .report-header { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">TERRAE<span> TEA</span> <span style="font-size:0.65rem;margin-left:4px;color:var(--muted)">// LAPORAN STOK HARIAN</span></div>
  <div class="header-meta">
    <strong id="clock">--:--:--</strong>
    <span id="dateDisplay">--</span>
  </div>
</div>

<div class="tabs-bar" id="tabsBar">
  <div class="tab active" data-tab="editor" onclick="switchTab('editor')">
    <span>Editor</span>
  </div>
  <div class="tab" data-tab="saved" onclick="switchTab('saved')">
    <span>Tersimpan</span>
    <span class="badge" id="savedCount" style="background:var(--accent);color:#0e0f0f;font-size:0.62rem;padding:1px 6px;border-radius:2px;font-weight:700;margin-left:4px">0</span>
  </div>
  <div id="dynamicTabs"></div>
  <div class="tab-add" onclick="addNewTab()" title="Tab Baru">＋</div>
</div>

<!-- EDITOR TAB -->
<div id="panel-editor" class="tab-panel active">
  <div class="content">
    <!-- Meta laporan -->
    <div class="report-header">
      <div class="field-group">
        <label>Nama Gudang / Lokasi</label>
        <input type="text" id="gudang" placeholder="cth: Gudang Utama A">
      </div>
      <div class="field-group">
        <label>Tanggal Laporan</label>
        <input type="date" id="tanggal">
      </div>
      <div class="field-group">
        <label>Petugas Stok</label>
        <input type="text" id="petugas" placeholder="Nama petugas">
      </div>
      <div class="field-group">
        <label>Shift</label>
        <select id="shift">
          <option value="Pagi (06:00-14:00)">Pagi (06:00–14:00)</option>
          <option value="Siang (14:00-22:00)">Siang (14:00–22:00)</option>
          <option value="Malam (22:00-06:00)">Malam (22:00–06:00)</option>
          <option value="Full Day">Full Day</option>
        </select>
      </div>
      <div class="field-group">
        <label>Nomor Laporan</label>
        <input type="text" id="noLaporan" placeholder="Auto-generate">
      </div>
      <div class="field-group">
        <label>Kategori Stok</label>
        <input type="text" id="kategori" placeholder="cth: Suku Cadang, Material">
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-grid">
      <div class="summary-card total">
        <div class="val" id="sumTotal">0</div>
        <div class="lbl">Total Item</div>
      </div>
      <div class="summary-card ok">
        <div class="val" id="sumOk">0</div>
        <div class="lbl">Stok Aman</div>
      </div>
      <div class="summary-card low">
        <div class="val" id="sumLow">0</div>
        <div class="lbl">Stok Rendah</div>
      </div>
      <div class="summary-card habis">
        <div class="val" id="sumHabis">0</div>
        <div class="lbl">Stok Habis</div>
      </div>
    </div>

    <!-- Table -->
    <div class="section-label">
      <span>Daftar Item Stok</span>
      <span class="badge" id="itemCount">0 item</span>
    </div>

    <div class="table-wrapper" id="tableContainer">
      <table id="stokTable">
        <thead>
          <tr>
            <th class="td-no">#</th>
            <th style="min-width:160px">Nama Barang</th>
            <th style="min-width:100px">Kode/SKU</th>
            <th style="min-width:80px">Satuan</th>
            <th style="min-width:80px">Stok Awal</th>
            <th style="min-width:80px">Masuk</th>
            <th style="min-width:80px">Keluar</th>
            <th style="min-width:80px">Stok Akhir</th>
            <th style="min-width:80px">Min. Stok</th>
            <th class="td-status">Status</th>
            <th style="min-width:120px">Lokasi Rak</th>
            <th class="td-del"></th>
          </tr>
        </thead>
        <tbody id="stokBody"></tbody>
      </table>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" onclick="addRow()">＋ Tambah Baris</button>
      <button class="btn btn-ghost" onclick="addRows5()">＋ Tambah 5 Baris</button>
      <button class="btn btn-ghost" onclick="clearTable()">Kosongkan Tabel</button>
    </div>

    <!-- Catatan -->
    <div class="notes-area">
      <div class="section-label" style="margin-bottom:12px">
        <span>Catatan & Keterangan</span>
      </div>
      <textarea id="catatan" placeholder="Tuliskan catatan tambahan, temuan anomali, rekomendasi pengadaan, dll..."></textarea>
    </div>

    <!-- Save actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="saveLaporan()">Simpan Laporan</button>
      <button class="btn btn-outline" onclick="previewAndExport()">Preview & Simpan Gambar</button>
      <button class="btn btn-warn" onclick="exportTableImage()">Ekspor Tabel ke Gambar</button>
    </div>
  </div>
</div>

<!-- SAVED TAB -->
<div id="panel-saved" class="tab-panel">
  <div class="content">
    <div class="section-label" style="margin-bottom:20px">
      <span>Laporan Tersimpan</span>
      <button class="btn btn-outline" style="font-size:0.7rem;padding:5px 12px" onclick="clearAllReports()">Hapus Semua</button>
    </div>
    <div class="reports-list" id="reportsList">
      <div class="empty-state">
        <div class="icon"></div>
        <div>Belum ada laporan te
